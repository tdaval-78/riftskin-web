<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; img-src 'self' data: https://bvajoufrxxntivxghdgs.supabase.co; style-src 'self' 'unsafe-inline'; script-src 'self' https://cdn.jsdelivr.net; connect-src 'self' https://bvajoufrxxntivxghdgs.supabase.co;" />
  <title data-i18n="cb_title">RIFTSKIN - Account</title>
  <style>
    :root {
      --bg-top: #0c1626;
      --bg-bottom: #16293e;
      --panel: rgba(43, 67, 93, 0.88);
      --stroke: #48607b;
      --text-main: #edf3fb;
      --text-sub: #a9bbd0;
      --ok: #5aa2c7;
      --ok-soft: #2a536a;
      --danger: #ff6f82;
      --input-bg: #2a435b;
      --input-stroke: #43627f;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Avenir Next", "Segoe UI", sans-serif;
      background: radial-gradient(circle at 80% -10%, rgba(74,122,168,.25), transparent 46%),
                  radial-gradient(circle at -10% 110%, rgba(46,82,118,.28), transparent 38%),
                  linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
      color: var(--text-main);
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(760px, 100%);
      border: 1px solid var(--stroke);
      background: var(--panel);
      border-radius: 22px;
      padding: 34px 28px;
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.28);
      text-align: center;
    }
    .logo {
      width: 92px;
      height: 92px;
      object-fit: contain;
      margin: 0 auto 14px;
      display: block;
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(28px, 5vw, 40px);
      line-height: 1.08;
    }
    p {
      margin: 0 auto 16px;
      max-width: 620px;
      color: var(--text-sub);
      font-size: 16px;
      line-height: 1.5;
    }
    .badge {
      margin: 20px auto 0;
      display: inline-block;
      border-radius: 999px;
      border: 1px solid #5f86a8;
      background: linear-gradient(180deg, var(--ok), var(--ok-soft));
      color: #eff7ff;
      padding: 9px 16px;
      font-weight: 700;
      text-transform: uppercase;
      font-size: 12px;
    }
    form {
      margin: 18px auto 0;
      max-width: 520px;
      text-align: left;
    }
    label {
      display: block;
      margin: 0 0 8px;
      color: #d9e8f8;
      font-size: 14px;
      font-weight: 600;
    }
    input {
      width: 100%;
      height: 48px;
      border-radius: 10px;
      border: 1px solid var(--input-stroke);
      background: var(--input-bg);
      color: #eef6ff;
      font-size: 16px;
      padding: 0 14px;
      margin-bottom: 12px;
      outline: none;
    }
    button {
      width: 100%;
      height: 48px;
      border: 1px solid #5f86a8;
      border-radius: 10px;
      background: linear-gradient(180deg, var(--ok), var(--ok-soft));
      color: #eff7ff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    .msg { margin-top: 12px; font-size: 14px; line-height: 1.4; }
    .msg.error { color: var(--danger); }
    .msg.ok { color: #7ce6c0; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <main class="card">
    <img class="logo" src="https://bvajoufrxxntivxghdgs.supabase.co/storage/v1/object/public/email-assets/icon.png" alt="RIFTSKIN logo" />

    <section id="confirm-view" class="hidden">
      <h1 data-i18n="cb_confirm_h1">Email confirmed</h1>
      <p data-i18n-html="cb_confirm_p_html">Your email address has been confirmed.</p>
      <div class="badge" data-i18n="cb_badge">Account Ready</div>
    </section>

    <section id="recovery-view" class="hidden">
      <h1 data-i18n="cb_recovery_h1">Choose a new password</h1>
      <p data-i18n="cb_recovery_p">Enter your new RIFTSKIN password, then return to the app and sign in.</p>
      <form id="reset-form">
        <label for="password" data-i18n="cb_new_password">New password</label>
        <input id="password" type="password" minlength="8" required />
        <label for="confirm-password" data-i18n="cb_confirm_password">Confirm password</label>
        <input id="confirm-password" type="password" minlength="8" required />
        <button id="submit-btn" type="submit" data-i18n="cb_update_password">Update password</button>
        <div id="message" class="msg"></div>
      </form>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/config.js"></script>
  <script src="/assets/translations.js"></script>
  <script src="/assets/i18n.js"></script>
  <script src="/assets/auth-callback.js"></script>
</body>
</html>
