
[functions.support-request]
enabled = true
verify_jwt = false
import_map = "./functions/support-request/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/support-request/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/support-request/*.html" ]

[functions.paddle-webhook]
enabled = true
verify_jwt = false
import_map = "./functions/paddle-webhook/deno.json"
entrypoint = "./functions/paddle-webhook/index.ts"
