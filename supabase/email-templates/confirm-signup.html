<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Confirm your RIFTSKIN email</title>
  </head>
  <body style="margin:0;padding:0;background:#0c1626;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#edf3fb;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#0c1626;padding:28px 12px;">
      <tr>
        <td align="center">
          <table role="presentation" width="640" cellspacing="0" cellpadding="0" style="width:100%;max-width:640px;background:#22364d;border:1px solid #48607b;border-radius:16px;">
            <tr>
              <td style="padding:28px 26px 20px;text-align:center;">
                <img
                  src="https://jfmrwxmlncvzoremcmbi.supabase.co/storage/v1/object/public/email-assets/icon.png"
                  alt="RIFTSKIN"
                  width="88"
                  height="88"
                  style="display:block;margin:0 auto 14px auto;border:0;outline:none;text-decoration:none;"
                />
                <h1 style="margin:0 0 10px 0;font-size:32px;line-height:1.15;font-weight:800;color:#edf3fb;">Confirm your email</h1>
                <p style="margin:0 0 18px 0;font-size:16px;line-height:1.55;color:#b7cade;">
                  Welcome to RIFTSKIN. Confirm your email address to activate your web account and sign in.
                </p>
                <a
                  href="{{ .ConfirmationURL }}"
                  style="display:inline-block;background:linear-gradient(180deg,#5aa2c7,#2a536a);border:1px solid #5f86a8;border-radius:10px;padding:12px 22px;color:#eef6ff;text-decoration:none;font-size:15px;font-weight:700;letter-spacing:.2px;"
                >
                  Confirm email
                </a>
                <p style="margin:18px 0 0 0;font-size:13px;line-height:1.5;color:#9eb4c9;">
                  After confirmation, you can return to <strong>/account.html</strong> and sign in.
                </p>
                <p style="margin:12px 0 0 0;font-size:13px;line-height:1.5;color:#9eb4c9;">
                  French: Confirmez votre adresse email pour activer votre compte web et vous connecter.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
